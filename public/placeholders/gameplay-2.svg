<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Gameplay placeholder: bot performing an embodied task">
  <rect width="1600" height="900" fill="#0A1428"/>
  <rect y="0" width="1600" height="540" fill="#1F2A4A"/>
  <rect y="540" width="1600" height="360" fill="#6B4423"/>
  <g font-family="Chakra Petch, sans-serif" fill="#E8E8ED">
    <text x="60" y="80" font-size="22" letter-spacing="2">GAMEPLAY · 02</text>
    <text x="60" y="120" font-size="36" font-family="Russo One, sans-serif">embodied task · mine → gather → return</text>
    <text x="60" y="170" font-size="18" opacity="0.7">replace with real capture from the demo session</text>
  </g>
  <!-- Block grid in front -->
  <g>
    <rect x="200" y="600" width="80" height="80" fill="#8A8A8A" stroke="#0A1428" stroke-width="2"/>
    <rect x="280" y="600" width="80" height="80" fill="#8A8A8A" stroke="#0A1428" stroke-width="2"/>
    <rect x="360" y="600" width="80" height="80" fill="#555555" stroke="#0A1428" stroke-width="2"/>
    <rect x="440" y="600" width="80" height="80" fill="#8A8A8A" stroke="#0A1428" stroke-width="2"/>
  </g>
  <!-- Bot mining -->
  <g transform="translate(380,540)">
    <circle r="60" fill="rgba(0,217,255,0.20)"/>
    <rect x="-22" y="-30" width="44" height="60" fill="#80EAFF" stroke="#00D9FF" stroke-width="3"/>
  </g>
</svg>
