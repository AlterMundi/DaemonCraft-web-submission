<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="DaemonCraft cover placeholder">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7EC0EE"/>
      <stop offset="60%" stop-color="#A4D9F7"/>
      <stop offset="100%" stop-color="#E8E8ED"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94C95C"/>
      <stop offset="100%" stop-color="#5A7F3A"/>
    </linearGradient>
    <pattern id="blocks" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="#7CAC50"/>
      <rect width="80" height="80" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect y="540" width="1600" height="360" fill="url(#blocks)"/>
  <rect y="540" width="1600" height="20" fill="#94C95C"/>

  <!-- floating allay -->
  <g transform="translate(900,320)">
    <circle r="80" fill="rgba(0,217,255,0.25)"/>
    <rect x="-30" y="-40" width="60" height="80" fill="#80EAFF" stroke="#00D9FF" stroke-width="3"/>
    <rect x="-12" y="-20" width="6" height="6" fill="#0A1428"/>
    <rect x="6" y="-20" width="6" height="6" fill="#0A1428"/>
    <rect x="-44" y="-20" width="14" height="40" fill="#00D9FF" opacity="0.7"/>
    <rect x="30" y="-20" width="14" height="40" fill="#00D9FF" opacity="0.7"/>
  </g>

  <!-- player silhouette -->
  <g transform="translate(620,620)">
    <rect x="-30" y="-100" width="60" height="60" fill="#9E6B3D"/>
    <rect x="-30" y="-40" width="60" height="80" fill="#4A90E2"/>
    <rect x="-30" y="40" width="25" height="60" fill="#2C3E50"/>
    <rect x="5" y="40" width="25" height="60" fill="#2C3E50"/>
  </g>

  <text x="800" y="120" text-anchor="middle" font-family="Russo One, sans-serif" font-size="64" fill="#0A1428" letter-spacing="4">DAEMONCRAFT · COVER</text>
  <text x="800" y="170" text-anchor="middle" font-family="Chakra Petch, sans-serif" font-size="24" fill="#0A1428" opacity="0.7">replace with real in-game capture</text>
</svg>
